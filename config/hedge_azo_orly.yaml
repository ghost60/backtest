# ============================================================
# TSLA + AZO + ORLY 三资产对冲回测配置
# ============================================================

data:
  path: "data/TSLA_25Y_yFinance.csv"
  start_date: "2011-01-01"
  end_date: "2026-03-04"

strategy:
  name: "ma_cross_hedge_triple"
  entry_delay: 0
  exit_delay: 0

factor:
  type: double_ma
  params:
    ma_short: 5
    ma_long: 30
    use_price_filter: true

# ---------- 资金管理 ----------
capital:
  initial: 1000000
  position_ratio: 1.0
  max_leverage: 1.0 # 最大杠杆倍数：1.0 不使用杠杆，2.0 表示两倍杠杆

hedge:
  enabled: true
  symbols:
    - name: "AZO"
      path: "data/AZO_25Y_yFinance.csv"
      weight: 0.5
    - name: "ORLY"
      path: "data/ORLY_25Y_yFinance.csv"
      weight: 0.5

output:
  dir: "result"
  chart_filename: "backtest_results_tsla_azo_orly.png"
  metrics_filename: "backtest_metrics_tsla_azo_orly.md"
