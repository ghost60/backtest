# ============================================================
# TSLA 量化回测 - 默认配置
# 可通过 -c 指定其他 YAML 文件覆盖
# ============================================================

# ---------- 数据与回测区间 ----------
data:
  # 主标的 CSV 路径：相对项目根或绝对路径
  path: "data/TSLA_25Y_yFinance.csv"
  # 回测起止日期（包含）
  start_date: "2011-01-01"
  end_date: "2026-03-04"

# ---------- 策略参数（执行层：与因子无关） ----------
# 仅保留信号后的执行规则；因子类型与参数见下方 factor 段
strategy:
  name: "ma_cross"              # 策略标识
  entry_delay: 0                # 信号出现后延迟几根 K 线入场，0 表示下一根即可
  exit_delay: 0                 # 信号出现后延迟几根 K 线出场

# ---------- 因子选择 ----------
# 因子决定买卖信号；参数随 type 不同而不同（double_ma / single_ma）
factor:
  type: double_ma
  params:
    ma_short: 5
    ma_long: 30
    use_price_filter: true

# ---------- 资金管理 ----------
capital:
  initial: 1000000               # 初始资金（美元）
  position_ratio: 1.0           # 持仓比例：1.0 表示全仓，0.5 表示半仓

# ---------- 输出 ----------
output:
  dir: "result"            # 结果目录，相对项目根；图表与 Markdown 均写在此目录
  chart_filename: "backtest_results_tsla.png"
  metrics_filename: "backtest_metrics_tsla.md"
  chart_figsize: [12, 10]       # 图表宽高（英寸）

