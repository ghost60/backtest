# ============================================================
# 多因子组合回测 - 演示配置
# ============================================================

data:
  path: "data/TSLA_25Y_yFinance.csv"
  start_date: "2010-01-01"
  end_date: "2026-03-01"

strategy:
  name: "multi_factor_portfolio"
  entry_delay: 0
  exit_delay: 0

# 如果使用多因子，用 factors: 列表形式
factors:
  - type: double_ma
    capital_alloc: 0.5 # 分配 50% 初始资金
    params:
      ma_short: 5
      ma_long: 30
      use_price_filter: true

  - type: adx_ma
    capital_alloc: 0.5 # 分配 50% 初始资金
    params:
      adx_threshold: 26
      moving_avg_day: 110
      adx_period: 14
      use_sma14_filter: true
      use_other_asset: true
      other_asset_path: "data/^GSPC_25Y_yFinance.csv"

capital:
  initial: 2000000 # 组合总初始资金（上面各分 100 万）
  position_ratio: 1.0 # 默认满仓（每个因子根据自己的可用资金进行100%投入）
  max_leverage: 1.0 # 各因子使用的最大杠杆倍数

output:
  dir: "result"
  chart_filename: "backtest_results_multi.png"
  metrics_filename: "backtest_metrics_multi.md"
  chart_figsize: [12, 10]
